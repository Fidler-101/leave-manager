<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Team Members')}"></head>
<body class="app-body">
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('team')}"></div>
    <main class="app-main">
        <div class="page-content">
            <div class="page-header">
                <h1 class="page-title">Team Members</h1>
                <p class="page-subtitle">All employees in the system.</p>
            </div>
            <div class="cards-grid-3">
                <div th:each="emp, iter : ${employees}" class="team-card">
                    <div class="team-avatar"
                         th:text="${emp.initials}"
                         th:style="'background:' + (${iter.index % 4 == 0} ? '#6c63ff' : (${iter.index % 4 == 1} ? '#f59e0b' : (${iter.index % 4 == 2} ? '#a855f7' : '#10b981')))">JD</div>
                    <p class="team-name" th:text="${emp.fullName}">John Doe</p>
                    <p class="team-dept" th:text="${emp.department}">Engineering</p>
                    <p class="team-email" th:text="${emp.email}">john@company.com</p>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
