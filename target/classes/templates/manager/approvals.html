<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Pending Approvals')}"></head>
<body class="app-body">
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('approvals')}"></div>
    <main class="app-main">
        <div class="page-content">
            <div th:if="${success}" class="alert alert-success mb-4">✓ <span th:text="${success}"></span></div>
            <div class="page-header">
                <h1 class="page-title">Pending Approvals</h1>
                <p class="page-subtitle">Review and action leave requests from your team.</p>
            </div>
            <div class="card">
                <div th:if="${#lists.isEmpty(pendingRequests)}" class="empty-state">📭 No pending approvals. All caught up!</div>
                <div th:each="req, iter : ${pendingRequests}" class="approval-row"
                     th:classappend="${!iter.last} ? 'approval-row-border' : ''">
                    <div class="approval-info">
                        <div class="approval-avatar"
                             th:text="${req.employee.initials}"
                             th:style="'background:' + (${iter.index % 3 == 0} ? '#6c63ff' : (${iter.index % 3 == 1} ? '#f59e0b' : '#a855f7'))">AS</div>
                        <div>
                            <p class="approval-name" th:text="${req.employee.fullName}"></p>
                            <p class="approval-meta"
                               th:text="${req.employee.department} + ' · ' + ${req.leaveType.displayName} + ' · ' +
                                        ${#temporals.format(req.startDate,'d MMM yyyy')} +
                                        (${req.startDate != req.endDate} ? ' – ' + ${#temporals.format(req.endDate,'d MMM yyyy')} : '') +
                                        ' (' + ${req.numberOfDays} + ' days)'"></p>
                            <p th:if="${req.reason != null}" class="approval-reason" th:text="${req.reason}"></p>
                        </div>
                    </div>
                    <div class="approval-btns">
                        <form th:action="@{/manager/approve/{id}(id=${req.id})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-approve">✓ Approve</button>
                        </form>
                        <form th:action="@{/manager/reject/{id}(id=${req.id})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-reject">✕ Reject</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
