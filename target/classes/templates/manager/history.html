<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('All Requests')}"></head>
<body class="app-body">
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('history')}"></div>
    <main class="app-main">
        <div class="page-content">
            <div class="page-header">
                <h1 class="page-title">All Leave Requests</h1>
                <p class="page-subtitle">Complete history of all team leave requests.</p>
            </div>
            <div class="card">
                <div th:if="${#lists.isEmpty(allRequests)}" class="empty-state">No requests found.</div>
                <table class="data-table" th:if="${!#lists.isEmpty(allRequests)}">
                    <thead>
                        <tr>
                            <th>Employee</th><th>Type</th><th>Dates</th><th>Days</th><th>Status</th><th>Submitted</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="req : ${allRequests}">
                            <td>
                                <div class="table-user">
                                    <div class="table-avatar" th:text="${req.employee.initials}"></div>
                                    <div>
                                        <p class="table-name" th:text="${req.employee.fullName}"></p>
                                        <p class="table-dept" th:text="${req.employee.department}"></p>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${req.leaveType.displayName}"></td>
                            <td th:text="${#temporals.format(req.startDate,'d MMM yyyy')} +
                                         (${req.startDate != req.endDate} ? ' – ' + ${#temporals.format(req.endDate,'d MMM yyyy')} : '')"></td>
                            <td th:text="${req.numberOfDays}"></td>
                            <td>
                                <span th:text="${req.status}"
                                      th:classappend="${req.status.name() == 'APPROVED'} ? 'badge-approved' :
                                                     (${req.status.name() == 'REJECTED'} ? 'badge-rejected' :
                                                     (${req.status.name() == 'CANCELLED'} ? 'badge-cancelled' : 'badge-pending'))"
                                      class="badge"></span>
                            </td>
                            <td th:text="${#temporals.format(req.createdAt,'d MMM yyyy')}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
