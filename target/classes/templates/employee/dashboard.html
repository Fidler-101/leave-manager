<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('My Dashboard')}"></head>
<body class="app-body">

<div class="app-layout">
    <!-- Sidebar -->
    <div th:replace="~{fragments/layout :: sidebar('dashboard')}"></div>

    <!-- Main content -->
    <main class="app-main">
        <div class="page-content">

            <!-- Flash messages -->
            <div th:if="${success}" class="alert alert-success mb-4">✓ <span th:text="${success}"></span></div>
            <div th:if="${error}"   class="alert alert-danger  mb-4">⚠️ <span th:text="${error}"></span></div>

            <!-- Header -->
            <div class="page-header">
                <h1 class="page-title">My Dashboard</h1>
                <p class="page-subtitle">Welcome back, <span th:text="${user.firstName}">John</span>. Here's your leave summary.</p>
            </div>

            <!-- Balance Cards -->
            <div class="cards-grid-3">
                <div th:each="balance : ${balances}" class="balance-card"
                     th:classappend="${balance.leaveType.name() == 'ANNUAL_LEAVE'} ? 'balance-annual' :
                                     (${balance.leaveType.name() == 'SICK_LEAVE'} ? 'balance-sick' : 'balance-parental')">
                    <div class="balance-card-top">
                        <div class="balance-icon"
                             th:text="${balance.leaveType.name() == 'ANNUAL_LEAVE'} ? '🏖️' :
                                      (${balance.leaveType.name() == 'SICK_LEAVE'} ? '🏥' : '👶')">🏖️</div>
                        <span class="balance-days" th:text="${balance.remaining}">13</span>
                    </div>
                    <p class="balance-label" th:text="${balance.leaveType.displayName}">Annual Leave</p>
                    <p class="balance-sub" th:text="${balance.used} + ' used of ' + ${balance.allocated} + ' days'">7 used of 20 days</p>
                    <div class="balance-bar-bg">
                        <div class="balance-bar-fill"
                             th:style="'width:' + (${balance.allocated} > 0 ? ${balance.used * 100 / balance.allocated} : 0) + '%'"></div>
                    </div>
                </div>
            </div>

            <!-- Apply + Calendar row -->
            <div class="two-col-layout">
                <!-- Apply Form -->
                <div class="card">
                    <div class="card-header-row">
                        <div class="card-icon-wrap">📋</div>
                        <h3 class="card-title">Apply for Leave</h3>
                    </div>

                    <form th:action="@{/employee/apply}" method="post" class="leave-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="form-group">
                            <label class="form-label">Leave Type <span class="req">*</span></label>
                            <select name="leaveType" class="form-input" required>
                                <option value="">Select type</option>
                                <option th:each="type : ${leaveTypes}"
                                        th:value="${type.name()}"
                                        th:text="${type.displayName}">Annual Leave</option>
                            </select>
                        </div>

                        <div class="form-row-2">
                            <div class="form-group">
                                <label class="form-label">Start Date <span class="req">*</span></label>
                                <input type="date" name="startDate" class="form-input"
                                       th:min="${today}" required/>
                            </div>
                            <div class="form-group">
                                <label class="form-label">End Date <span class="req">*</span></label>
                                <input type="date" name="endDate" class="form-input"
                                       th:min="${today}" required/>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Reason <span class="form-optional">(optional)</span></label>
                            <textarea name="reason" class="form-input form-textarea"
                                      placeholder="Optional reason for your leave request..." rows="3"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Attachment <span class="form-optional">(max 5MB)</span></label>
                            <label class="upload-area">
                                📎 Click to upload file
                                <input type="file" class="hidden-input"/>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full">Submit Request</button>
                    </form>
                </div>

                <!-- Mini Calendar -->
                <div class="card" id="calendarCard">
                    <div class="calendar-header">
                        <span class="calendar-title">Calendar</span>
                        <div class="calendar-nav">
                            <button onclick="prevMonth()" class="cal-nav-btn">‹</button>
                            <span id="calMonthLabel" class="cal-month-label"></span>
                            <button onclick="nextMonth()" class="cal-nav-btn">›</button>
                        </div>
                    </div>
                    <div class="cal-days-header">
                        <span th:each="d : ${ {'Su','Mo','Tu','We','Th','Fr','Sa'} }" th:text="${d}"></span>
                    </div>
                    <div id="calGrid" class="cal-grid"></div>
                    <div class="cal-legend">
                        <div class="cal-legend-item"><span class="legend-dot legend-approved"></span> Approved Leave</div>
                        <div class="cal-legend-item"><span class="legend-dot legend-weekend"></span> Holiday/Weekend</div>
                    </div>
                </div>
            </div>

            <!-- Recent Requests -->
            <div class="card">
                <div class="card-header-row space-between">
                    <h3 class="card-title">Recent Requests</h3>
                    <span class="text-muted" th:text="${recentRequests.size()} + ' total'">3 total</span>
                </div>

                <div th:if="${#lists.isEmpty(recentRequests)}" class="empty-state">
                    <p>📄 No recent requests</p>
                </div>

                <div th:each="req, iter : ${recentRequests}" class="request-row"
                     th:classappend="${!iter.last} ? 'request-row-border' : ''">
                    <div class="request-info">
                        <div class="request-icon">📄</div>
                        <div>
                            <p class="request-type" th:text="${req.leaveType.displayName}">Annual Leave</p>
                            <p class="request-dates"
                               th:text="${#temporals.format(req.startDate,'d MMM yyyy')} +
                                        (${req.startDate != req.endDate} ? ' – ' + ${#temporals.format(req.endDate,'d MMM yyyy')} : '') +
                                        ' · ' + ${req.numberOfDays} + ' day' + (${req.numberOfDays != 1} ? 's' : '')">
                            </p>
                        </div>
                    </div>
                    <div class="request-actions">
                        <span th:text="${req.status}"
                              th:classappend="${req.status.name() == 'APPROVED'} ? 'badge-approved' :
                                             (${req.status.name() == 'REJECTED'} ? 'badge-rejected' :
                                             (${req.status.name() == 'CANCELLED'} ? 'badge-cancelled' : 'badge-pending'))"
                              class="badge">Approved</span>
                        <form th:if="${req.status.name() == 'PENDING'}"
                              th:action="@{/employee/cancel/{id}(id=${req.id})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-link text-danger"
                                    onclick="return confirm('Cancel this request?')">Cancel</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script th:src="@{/js/calendar.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
