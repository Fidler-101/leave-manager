<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My History')}"></head>
<body class="app-body">
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('history')}"></div>
    <main class="app-main">
        <div class="page-content">
            <div class="page-header">
                <h1 class="page-title">My Leave History</h1>
                <p class="page-subtitle">All your submitted leave requests.</p>
            </div>
            <div class="card">
                <div th:if="${#lists.isEmpty(requests)}" class="empty-state">📄 No leave requests found.</div>
                <div th:each="req, iter : ${requests}" class="request-row"
                     th:classappend="${!iter.last} ? 'request-row-border' : ''">
                    <div class="request-info">
                        <div class="request-icon">📄</div>
                        <div>
                            <p class="request-type" th:text="${req.leaveType.displayName}"></p>
                            <p class="request-dates"
                               th:text="${#temporals.format(req.startDate,'d MMM yyyy')} +
                                        (${req.startDate != req.endDate} ? ' – ' + ${#temporals.format(req.endDate,'d MMM yyyy')} : '') +
                                        ' · ' + ${req.numberOfDays} + ' day' + (${req.numberOfDays != 1} ? 's' : '')"></p>
                            <p th:if="${req.reason != null and !req.reason.isEmpty()}"
                               class="request-reason" th:text="${req.reason}"></p>
                        </div>
                    </div>
                    <div class="request-actions">
                        <span th:text="${req.status}"
                              th:classappend="${req.status.name() == 'APPROVED'} ? 'badge-approved' :
                                             (${req.status.name() == 'REJECTED'} ? 'badge-rejected' :
                                             (${req.status.name() == 'CANCELLED'} ? 'badge-cancelled' : 'badge-pending'))"
                              class="badge"></span>
                        <form th:if="${req.status.name() == 'PENDING'}"
                              th:action="@{/employee/cancel/{id}(id=${req.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-link text-danger"
                                    onclick="return confirm('Cancel this request?')">Cancel</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
