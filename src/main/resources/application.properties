# Port Handling: Render uses the PORT variable. 
# We default to 8080 for local but allow Render to override.
server.port=${PORT:8080}

# Database Connection: Using the exact Keys from your Render Env Variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
# We remove the hardcoded dialect to fix the warning you saw
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection Pooling (Important for Render's Free Tier limits)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Thymeleaf Settings
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Logging & Session
server.servlet.session.timeout=30m
logging.level.com.leavemanager=DEBUG