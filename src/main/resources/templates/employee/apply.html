<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Apply for Leave')}"></head>
<body class="app-body">
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar('apply')}"></div>
    <main class="app-main">
        <div class="page-content">
            <div th:if="${success}" class="alert alert-success mb-4">✓ <span th:text="${success}"></span></div>
            <div th:if="${error}"   class="alert alert-danger  mb-4">⚠️ <span th:text="${error}"></span></div>
            <div class="page-header">
                <h1 class="page-title">Apply for Leave</h1>
                <p class="page-subtitle">Submit a new leave request for approval.</p>
            </div>
            <div class="single-col-card">
                <div class="card">
                    <div class="card-header-row">
                        <div class="card-icon-wrap">📋</div>
                        <h3 class="card-title">New Leave Request</h3>
                    </div>
                    <form th:action="@{/employee/apply}" method="post" class="leave-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="form-group">
                            <label class="form-label">Leave Type <span class="req">*</span></label>
                            <select name="leaveType" class="form-input" required>
                                <option value="">Select type</option>
                                <option th:each="type : ${leaveTypes}" th:value="${type.name()}" th:text="${type.displayName}"></option>
                            </select>
                        </div>
                        <div class="form-row-2">
                            <div class="form-group">
                                <label class="form-label">Start Date <span class="req">*</span></label>
                                <input type="date" name="startDate" class="form-input" th:min="${today}" required/>
                            </div>
                            <div class="form-group">
                                <label class="form-label">End Date <span class="req">*</span></label>
                                <input type="date" name="endDate" class="form-input" th:min="${today}" required/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Reason <span class="form-optional">(optional)</span></label>
                            <textarea name="reason" class="form-input form-textarea" placeholder="Optional reason..." rows="4"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Attachment <span class="form-optional">(max 5MB)</span></label>
                            <label class="upload-area">📎 Click to upload file<input type="file" class="hidden-input"/></label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Submit Request</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
